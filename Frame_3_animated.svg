<svg width="122" height="102" viewBox="0 0 122 102" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    /* Left blush group */
    .blush-left {
      animation: blush-pulse 1.6s ease-in-out infinite;
      transform-origin: 53px 50px;
    }
    /* Right blush group — offset so they alternate like a heartbeat */
    .blush-right {
      animation: blush-pulse 1.6s ease-in-out infinite;
      animation-delay: 0.8s;
      transform-origin: 70px 50px;
    }

    @keyframes blush-pulse {
      0%   { opacity: 0.2; transform: scale(0.85); }
      50%  { opacity: 1;   transform: scale(1.35); }
      100% { opacity: 0.2; transform: scale(0.85); }
    }
  </style>
</defs>

